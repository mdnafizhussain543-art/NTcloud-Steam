<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTcloud Steam</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #081120, #0d1b2a 45%, #132238 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      border-radius: 26px;
      padding: 28px 20px;
      backdrop-filter: blur(12px);
    }

    .title {
      text-align: center;
      font-size: 34px;
      font-weight: 800;
      margin: 0;
      letter-spacing: 0.3px;
    }

    .sub {
      text-align: center;
      margin-top: 10px;
      color: #b8c7da;
      font-size: 15px;
    }

    .input-wrap {
      margin-top: 26px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    input {
      width: 100%;
      border: none;
      outline: none;
      padding: 17px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.09);
      color: white;
      font-size: 17px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    input::placeholder {
      color: #cbd5e1;
    }

    button {
      width: 100%;
      border: none;
      outline: none;
      padding: 16px;
      font-size: 20px;
      font-weight: 700;
      color: white;
      border-radius: 18px;
      cursor: pointer;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.28);
      transition: transform 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .error {
      margin-top: 12px;
      text-align: center;
      color: #ff9e9e;
      font-size: 14px;
      display: none;
    }

    .loader-screen {
      display: none;
      margin-top: 24px;
      text-align: center;
      padding: 26px 12px 8px;
      animation: fadeIn 0.35s ease;
    }

    .spinner {
      width: 58px;
      height: 58px;
      margin: 0 auto 14px;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,0.15);
      border-top-color: #60a5fa;
      animation: spin 1s linear infinite;
    }

    .loader-text {
      color: #d7e2ef;
      font-size: 15px;
      letter-spacing: 0.3px;
    }

    .player-section {
      display: none;
      margin-top: 24px;
      animation: fadeIn 0.45s ease;
    }

    .player-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      background: black;
    }

    .gesture-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50%;
      z-index: 5;
    }

    .left-zone { left: 0; }
    .right-zone { right: 0; }

    .overlay-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(0,0,0,0.58);
      color: white;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 22px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      z-index: 9;
      transition: opacity 0.18s ease, transform 0.18s ease;
      min-width: 110px;
      text-align: center;
    }

    .overlay-msg.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .speed-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 9;
      background: rgba(0,0,0,0.58);
      color: white;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      display: none;
    }

    .hint-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      color: #d8e3f0;
      font-size: 14px;
      line-height: 1.6;
    }

    .hint-box b {
      color: white;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .title {
        font-size: 28px;
      }

      .card {
        padding: 22px 14px;
      }

      .overlay-msg {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1 class="title">NTcloud Steam</h1>
      <div class="sub">Paste your direct video link and press Enter</div>

      <div class="input-wrap">
        <input type="text" id="videoInput" placeholder="Paste" />
        <button id="enterBtn">Enter</button>
      </div>

      <div class="error" id="errorMsg"></div>

      <div class="loader-screen" id="loaderScreen">
        <div class="spinner"></div>
        <div class="loader-text">Loading video, please wait...</div>
      </div>

      <div class="player-section" id="playerSection">
        <div class="player-shell" id="playerShell">
          <video id="videoPlayer" controls playsinline preload="metadata"></video>

          <div class="gesture-zone left-zone" id="leftZone"></div>
          <div class="gesture-zone right-zone" id="rightZone"></div>

          <div class="overlay-msg" id="overlayMsg">+10s</div>
          <div class="speed-badge" id="speedBadge">2x speed</div>
        </div>

        <div class="hint-box">
          <div><b>Left double tap:</b> 10 seconds back</div>
          <div><b>Right double tap:</b> 10 seconds forward</div>
          <div><b>Long press on video:</b> play at 2x speed</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const videoInput = document.getElementById("videoInput");
    const enterBtn = document.getElementById("enterBtn");
    const errorMsg = document.getElementById("errorMsg");
    const loaderScreen = document.getElementById("loaderScreen");
    const playerSection = document.getElementById("playerSection");
    const videoPlayer = document.getElementById("videoPlayer");
    const leftZone = document.getElementById("leftZone");
    const rightZone = document.getElementById("rightZone");
    const overlayMsg = document.getElementById("overlayMsg");
    const speedBadge = document.getElementById("speedBadge");
    const playerShell = document.getElementById("playerShell");

    let pressTimer = null;
    let longPressActive = false;

    function isValidVideoUrl(url) {
      return /\.(mp4|webm|ogg)(\?.*)?$/i.test(url);
    }

    function showMessage(text) {
      overlayMsg.textContent = text;
      overlayMsg.classList.add("show");
      clearTimeout(showMessage.timer);
      showMessage.timer = setTimeout(() => {
        overlayMsg.classList.remove("show");
      }, 700);
    }

    function loadVideo() {
      const url = videoInput.value.trim();

      errorMsg.style.display = "none";
      playerSection.style.display = "none";
      loaderScreen.style.display = "none";

      if (!url) {
        errorMsg.textContent = "Please paste a video link.";
        errorMsg.style.display = "block";
        return;
      }

      if (!isValidVideoUrl(url)) {
        errorMsg.textContent = "Use a direct video link like .mp4, .webm, or .ogg";
        errorMsg.style.display = "block";
        return;
      }

      loaderScreen.style.display = "block";

      setTimeout(() => {
        videoPlayer.src = url;
        videoPlayer.load();
      }, 1200);
    }

    enterBtn.addEventListener("click", loadVideo);

    videoInput.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        loadVideo();
      }
    });

    videoPlayer.addEventListener("loadeddata", () => {
      loaderScreen.style.display = "none";
      playerSection.style.display = "block";
    });

    videoPlayer.addEventListener("error", () => {
      loaderScreen.style.display = "none";
      errorMsg.textContent = "Video could not be loaded. Try another direct video link.";
      errorMsg.style.display = "block";
    });

    rightZone.addEventListener("dblclick", () => {
      if (!videoPlayer.duration) return;
      videoPlayer.currentTime = Math.min(videoPlayer.currentTime + 10, videoPlayer.duration);
      showMessage("+10s");
    });

    leftZone.addEventListener("dblclick", () => {
      videoPlayer.currentTime = Math.max(videoPlayer.currentTime - 10, 0);
      showMessage("-10s");
    });

    function startLongPress(e) {
      e.preventDefault();
      clearTimeout(pressTimer);
      pressTimer = setTimeout(() => {
        longPressActive = true;
        videoPlayer.playbackRate = 2;
        speedBadge.style.display = "block";
      }, 300);
    }

    function endLongPress() {
      clearTimeout(pressTimer);
      if (longPressActive) {
        longPressActive = false;
        videoPlayer.playbackRate = 1;
        speedBadge.style.display = "none";
      }
    }

    playerShell.addEventListener("mousedown", startLongPress);
    playerShell.addEventListener("mouseup", endLongPress);
    playerShell.addEventListener("mouseleave", endLongPress);

    playerShell.addEventListener("touchstart", startLongPress, { passive: false });
    playerShell.addEventListener("touchend", endLongPress);
    playerShell.addEventListener("touchcancel", endLongPress);
  </script>
</body>
  </html>
